name: Unsigned Preview Release

on:
  push:
    tags:
      - 'v*-*'

permissions:
  contents: write

env:
  NODE_OPTIONS: --max-old-space-size=4096

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/release-policy.mjs --tag "${GITHUB_REF_NAME}"
        env:
          CHARTER_SIGNING_MODE: unsigned
      - run: npm run check
      - run: npm test
      - run: npm run test:perf
      - run: xvfb-run --auto-servernum npm run test:e2e
      - run: xvfb-run --auto-servernum npm run test:security
      - run: xvfb-run --auto-servernum npm run test:soak
      - run: node scripts/dependency-safety.mjs --check
      - run: npm audit --audit-level=high
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gate-reports
          path: test-results/
          if-no-files-found: ignore

  package:
    needs: release-gates
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
            artifact: macos
          - os: windows-latest
            target: win
            artifact: windows
          - os: ubuntu-latest
            target: linux
            artifact: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run package -- --${{ matrix.target }}
        env:
          CHARTER_SIGNING_MODE: unsigned
      - name: Packaged Electron smoke (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test:install:e2e
      - name: Packaged Electron smoke
        if: runner.os != 'Linux'
        run: npm run test:install:e2e
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap
            release/*.tar.gz
          if-no-files-found: error

  publish:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - run: node scripts/release-policy.mjs --tag "${GITHUB_REF_NAME}"
        env:
          CHARTER_SIGNING_MODE: unsigned
      - run: node scripts/release-metadata.mjs --assets release-assets --output release-assets
        env:
          CHARTER_SIGNING_MODE: unsigned
      - name: Publish GitHub prerelease
        run: gh release create "${GITHUB_REF_NAME}" release-assets/* --verify-tag --prerelease --latest=false --title "Charter ${GITHUB_REF_NAME} — Unsigned Preview" --notes-file docs/RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ github.token }}
