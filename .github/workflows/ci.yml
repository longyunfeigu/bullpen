name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test
      - run: npm run build
      - name: E2E (Linux headless)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test:e2e
      - name: E2E
        if: runner.os != 'Linux'
        run: npm run test:e2e

  package-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
          - os: windows-latest
            target: win
          - os: ubuntu-latest
            target: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run package -- --${{ matrix.target }}
        env:
          CHARTER_SIGNING_MODE: unsigned
      - name: Packaged Electron smoke (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test:install:e2e
      - name: Packaged Electron smoke
        if: runner.os != 'Linux'
        run: npm run test:install:e2e
