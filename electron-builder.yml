appId: com.pi-ide.desktop
productName: Charter
copyright: Copyright © 2026
electronLanguages: [en, zh_CN]

directories:
  output: release
  buildResources: build-resources

files:
  - package.json
  - apps/desktop-main/dist/**
  - apps/desktop-preload/dist/**
  - apps/agent-worker/dist/**
  - apps/desktop-renderer/dist/**
  - '!**/*.map'

asarUnpack:
  - 'node_modules/node-pty/**'
  - 'node_modules/@vscode/ripgrep/**'

npmRebuild: false

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  identity: null
  hardenedRuntime: false

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: tar.gz
      arch: [x64]
  category: Development
  artifactName: '${productName}-${version}-linux-preview.${ext}'

publish: null
