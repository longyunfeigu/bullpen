appId: com.pi-ide.desktop
productName: Charter
copyright: Copyright © 2026
electronLanguages: [en, zh_CN]

directories:
  output: release
  buildResources: build-resources

asar: true

files:
  - package.json
  - apps/desktop-main/dist/**
  - apps/desktop-preload/dist/**
  - apps/agent-worker/dist/**
  - apps/desktop-renderer/dist/**
  - '!**/*.map'

asarUnpack:
  - 'node_modules/node-pty/**'
  - 'node_modules/@vscode/ripgrep/**'

npmRebuild: false

# M11-01: flip Electron fuses (runAsNode off, NODE_OPTIONS/inspect dead,
# asar integrity + onlyLoadAppFromAsar on) on every packed binary.
afterPack: scripts/after-pack.cjs

mac:
  category: public.app-category.developer-tools
  artifactName: '${productName}-${version}-mac-${arch}.${ext}'
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.inherit.plist
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  # Required for future Developer ID notarization. Unsigned Preview builds use
  # an ad-hoc identity because scripts/package.mjs disables identity discovery.
  hardenedRuntime: true

win:
  artifactName: '${productName}-${version}-windows-${arch}-setup.${ext}'
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: tar.gz
      arch: [x64]
  category: Development
  artifactName: '${productName}-${version}-linux-preview.${ext}'

# GitHub Actions owns draft/prerelease publication so a local package command
# can never mutate Releases implicitly. Signing and publishing are independent.
publish: null
